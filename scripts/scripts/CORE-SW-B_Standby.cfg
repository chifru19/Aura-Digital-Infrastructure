! --- HSRP Standby Configuration ---
interface Vlan10
 ip address 192.168.10.3 255.255.255.0
 standby 10 ip 192.168.10.1
 ip access-group 199 in

interface Vlan30
 ip address 192.168.30.3 255.255.255.0
 standby 30 ip 192.168.30.1
 ip access-group 130 in
 ip access-group 199 in

! --- Zero Trust ACL Definitions ---
access-list 130 remark Guest to Server Block
access-list 130 deny ip 192.168.30.0 0.0.0.255 192.168.50.0 0.0.0.255
access-list 130 permit ip any any

access-list 199 remark Management Plane Protection
access-list 199 deny ip 192.168.10.0 0.0.0.255 192.168.99.0 0.0.0.255
access-list 199 deny ip 192.168.30.0 0.0.0.255 192.168.99.0 0.0.0.255
access-list 199 permit ip any any
!
