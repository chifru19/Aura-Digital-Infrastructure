! --- HSRP & SVI Layer 3 Configuration ---
interface Vlan10
 description IT_Admin_Gateway
 ip address 192.168.10.2 255.255.255.0
 standby 10 ip 192.168.10.1
 standby 10 priority 150
 standby 10 preempt
 ip access-group 199 in

interface Vlan30
 description Guest_Network_Gateway
 ip address 192.168.30.2 255.255.255.0
 standby 30 ip 192.168.30.1
 standby 30 priority 150
 standby 30 preempt
 ip access-group 199 in

interface Vlan99
 description Management_VLAN_SVI
 ip address 192.168.99.2 255.255.255.0
 standby 99 ip 192.168.99.1
 standby 99 priority 150
 standby 99 preempt

! --- Infrastructure Services ---
ntp master 8
line vty 0 4
 transport input ssh
 privilege level 15
!
! --- DHCP Snooping & DAI (MitM Protection) ---
ip dhcp snooping
ip dhcp snooping vlan 10,20,30,50,99
no ip dhcp snooping information option
ip arp inspection vlan 10,20,30,50,99

! --- Trust Boundary (Verified on Gig0/1) ---
! --- Stage 3: Monitoring & Observability ---
logging host 192.168.99.50
logging trap notifications
service timestamps log datetime msec
snmp-server community AuraPublic ro
snmp-server contact FrankFru_Admin