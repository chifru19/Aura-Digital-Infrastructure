! --- Aura Digital Infrastructure: Switch 1 Hardened ---
!
hostname Switch1
!
! [Management Plane]
ip ssh version 2
!
! [Control Plane - HSRP]
interface Vlan10
 standby 10 ip 192.168.10.1
 standby 10 priority 150
 standby 10 preempt
!
! [Data Plane - Port Security]
interface range Fa0/1 - 3
 switchport port-security
 switchport port-security mac-address sticky
!
! [Anti-Spoofing - DHCP Snooping]
ip dhcp snooping
ip dhcp snooping vlan 10,20,30,50,99
