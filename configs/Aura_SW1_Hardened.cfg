! Aura Digital Infrastructure - Switch 1 (Primary)
! Hardening Level: High
!
hostname Switch1
!
! [Layer 3 Redundancy - HSRP]
interface Vlan10
 standby 10 ip 192.168.10.1
 standby 10 priority 150
 standby 10 preempt
!
! [Layer 2 Security - Port Security]
interface range FastEthernet0/1 - 3
 switchport mode access
 switchport port-security
 switchport port-security maximum 1
 switchport port-security violation shutdown
 switchport port-security mac-address sticky
!
! [IP Integrity - DHCP Snooping]
ip dhcp snooping
ip dhcp snooping vlan 10,20,30,50,99
no ip dhcp snooping information option
interface range FastEthernet0/4, FastEthernet0/7 - 8
 ip dhcp snooping trust
!
! [Management Security]
ip ssh version 2
line vty 0 15
 access-class 10 in
 transport input ssh
